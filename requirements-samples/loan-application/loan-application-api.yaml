openapi: 3.0.3

info:
  title: Loan Application API
  description: API for an online cash loan application process (fintech). Covers application submission, retrieval, listing for analysts, and status updates.
  version: 1.0.0

servers:
  - url: https://api.example-lender.com/v1
    description: Production

paths:
  /applications:
    post:
      summary: Submit a new loan application
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - firstName
                - lastName
                - pesel
                - loanAmount
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                pesel:
                  type: string
                monthlyIncome:
                  type: integer
                loanAmount:
                  type: integer
      responses:
        '201':
          description: Application created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '401':
          description: Missing or invalid token
        '422':
          description: Validation failed (e.g. applicant under 18, invalid PESEL)
    get:
      summary: List loan applications
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of loan applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Application'
        '401':
          description: Missing or invalid token

  /applications/{applicationId}:
    get:
      summary: Get a single loan application
      security:
        - bearerAuth: []
      parameters:
        - name: applicationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Application found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '401':
          description: Missing or invalid token
        '404':
          description: Application does not exist
    patch:
      summary: Update application status
      security:
        - bearerAuth: []
      parameters:
        - name: applicationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
      responses:
        '200':
          description: Application updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '401':
          description: Missing or invalid token
        '404':
          description: Application does not exist
        '409':
          description: Application is already closed

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Application:
      type: object
      required:
        - id
        - firstName
        - lastName
        - pesel
        - loanAmount
        - status
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        pesel:
          type: string
        monthlyIncome:
          type: integer
        loanAmount:
          type: integer
        status:
          type: string
        creditScore:
          type: integer
        createdAt:
          type: string
          format: date-time
